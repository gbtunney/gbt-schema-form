name: Build All

on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    build-all:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - run: pnpm install

            - name: Report Status #prior to fixing
              run: |
                  pnpm report

            - name: Fix report (non-blocking)
              run: |
                  if ! pnpm fix; then
                    echo "::warning::pnpm fix failed (report-only mode)"
                  fi

            - name: Build and test all projects
              run: |
                  pnpm test
