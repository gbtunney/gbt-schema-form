name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Run Nx affected tasks
              run: |
                  pnpm exec nx affected \
                    -t lint,typecheck,test,build \
                    --base=origin/main \
                    --head=HEAD
